<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPSsmart - Optimizador de Rutas</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="header-content">
                <h1><i class="fas fa-route"></i> GPSsmart</h1>
                <p class="subtitle">Optimizador inteligente de rutas</p>
            </div>
        </header>

        <!-- Main Layout -->
        <div class="main-layout">
            <!-- Left Panel - Input Form -->
            <aside class="input-panel">
                <div class="panel-header">
                    <h2>Nueva Ruta</h2>
                </div>

                <div class="form-section">
                    <div class="form-group">
                        <label for="startingPoint">
                            <i class="fas fa-map-pin"></i> Punto de Partida
                        </label>
                        <input type="text" id="startingPoint" placeholder="Ej: Av. Corrientes 1234, CABA" class="form-input">
                    </div>

                    <div class="divider">Direcciones Intermedias</div>

                    <div id="directionsContainer" class="directions-list">
                        <div class="direction-item">
                            <span class="direction-number">1</span>
                            <input type="text" class="directionInput form-input" placeholder="Ingresa la dirección">
                        </div>
                        <div class="direction-item">
                            <span class="direction-number">2</span>
                            <input type="text" class="directionInput form-input" placeholder="Ingresa la dirección">
                        </div>
                        <div class="direction-item">
                            <span class="direction-number">3</span>
                            <input type="text" class="directionInput form-input" placeholder="Ingresa la dirección">
                        </div>
                        <div class="direction-item">
                            <span class="direction-number">4</span>
                            <input type="text" class="directionInput form-input" placeholder="Ingresa la dirección">
                        </div>
                        <div class="direction-item">
                            <span class="direction-number">5</span>
                            <input type="text" class="directionInput form-input" placeholder="Ingresa la dirección">
                        </div>
                        <div class="direction-item">
                            <span class="direction-number">6</span>
                            <input type="text" class="directionInput form-input" placeholder="Ingresa la dirección">
                        </div>
                        <div class="direction-item">
                            <span class="direction-number">7</span>
                            <input type="text" class="directionInput form-input" placeholder="Ingresa la dirección">
                        </div>
                        <div class="direction-item">
                            <span class="direction-number">8</span>
                            <input type="text" class="directionInput form-input" placeholder="Ingresa la dirección">
                        </div>
                        <div class="direction-item">
                            <span class="direction-number">9</span>
                            <input type="text" class="directionInput form-input" placeholder="Ingresa la dirección">
                        </div>
                        <div class="direction-item">
                            <span class="direction-number">10</span>
                            <input type="text" class="directionInput form-input" placeholder="Ingresa la dirección">
                        </div>
                    </div>

                    <button id="addDirectionBtn" class="btn btn-secondary btn-sm">
                        <i class="fas fa-plus"></i> Agregar Dirección
                    </button>
                </div>

                <div class="form-actions">
                    <button id="sendBtn" class="btn btn-primary btn-lg">
                        <i class="fas fa-zap"></i> Calcular Ruta Optimizada
                    </button>
                </div>
            </aside>

            <!-- Right Panel - Results -->
            <main class="results-panel">
                <div class="panel-header">
                    <h2>Ruta Optimizada</h2>
                </div>
                <div id="messages" class="messages-container"></div>
            </main>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
